name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet: ['8.0.x', '10.0.x']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - run: dotnet restore

      - run: dotnet build Beads.Net.sln -c Release --no-restore

      - name: Run library tests
        run: dotnet test tests/Beads.Net.Tests -c Release --no-build --logger "trx;LogFileName=lib-${{ matrix.dotnet }}.trx" --results-directory TestResults

      - name: Run CLI smoke tests
        run: dotnet test tests/Beads.Cli.Tests -c Release --no-build --framework net8.0 --logger "trx;LogFileName=cli-${{ matrix.dotnet }}.trx" --results-directory TestResults
        if: matrix.dotnet == '8.0.x'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.dotnet }}
          path: TestResults/*.trx
