name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.2.3)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            echo "::error::Version required — push a v* tag or provide a version input"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - run: dotnet restore
      - run: dotnet build Beads.Net.sln -c Release --no-restore

      - name: Run library tests
        run: dotnet test tests/Beads.Net.Tests -c Release --no-build --logger "trx;LogFileName=lib.trx" --results-directory TestResults

      - name: Run CLI smoke tests
        run: dotnet test tests/Beads.Cli.Tests -c Release --no-build --framework net8.0 --logger "trx;LogFileName=cli.trx" --results-directory TestResults

      - name: Pack Beads.Net (Library)
        run: >
          dotnet pack src/Beads.Net/Beads.Net.csproj -c Release -o artifacts
          /p:PackageVersion=${{ steps.version.outputs.version }}
          /p:ContinuousIntegrationBuild=true

      - name: Pack Beads.Cli (dotnet tool)
        run: >
          dotnet pack src/Beads.Cli/Beads.Cli.csproj -c Release -o artifacts
          /p:PackageVersion=${{ steps.version.outputs.version }}
          /p:ContinuousIntegrationBuild=true

      - uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      - name: Publish to NuGet
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          dotnet nuget push "artifacts/*.snupkg" --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate

  build-binaries:
    needs: release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish self-contained binary
        run: >
          dotnet publish src/Beads.Cli/Beads.Cli.csproj -c Release
          -f net8.0
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -p:Version=${{ needs.release.outputs.version }}
          -o dist/${{ matrix.rid }}

      - name: Collect single-file asset
        shell: pwsh
        run: |
          $rid = "${{ matrix.rid }}"
          $outDir = Join-Path "dist" $rid

          if (-not (Test-Path $outDir)) {
            Write-Error "Publish output directory not found: $outDir"
            exit 1
          }

          if ("${{ matrix.os }}" -eq "windows-latest") {
            $candidate = Get-ChildItem $outDir -File | Where-Object { $_.Extension -eq ".exe" } | Select-Object -First 1
            $targetName = "beads-$rid.exe"
          }
          else {
            $candidate = Get-ChildItem $outDir -File | Where-Object { $_.Extension -eq "" -and $_.Name -notlike "*.pdb" } | Select-Object -First 1
            $targetName = "beads-$rid"
          }

          if (-not $candidate) {
            Write-Error "Could not find single executable in $outDir"
            Get-ChildItem $outDir -File | Select-Object Name, Length
            exit 1
          }

          New-Item -ItemType Directory -Path "release-assets" -Force | Out-Null
          Copy-Item $candidate.FullName (Join-Path "release-assets" $targetName)

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: release-assets/*
